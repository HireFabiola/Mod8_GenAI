<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-container">
    <h1>HTML + JavaScript Study Deck</h1>
    <p class="deck-note">Choose one of the options below for your review mode</p>
    <div class="flashcard-filter">
      <label for="review-filter">Review:</label>
      <select id="review-filter" aria-label="Choose review content">
        <option value="all">HTML & JavaScript</option>
        <option value="html">HTML only</option>
        <option value="javascript">JavaScript only</option>
      </select>
    </div>
    <div class="card-deck">
      <div class="flashcard next-card" id="preview-card" aria-hidden="true">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="card-label">Definition</div>
            <div class="card-definition">Definition will appear here.</div>
          </div>
          <div class="card-face card-back">
            <div class="card-back-body">
              <div class="card-label">Term</div>
              <div class="card-word">Term will appear here</div>
            </div>
          </div>
        </div>
      </div>
      <div class="flashcard" id="flashcard" tabindex="0" role="button" aria-pressed="false">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="card-label">Definition</div>
            <div class="card-definition">Definition will appear here.</div>
            <span class="hint-toggle" id="show-hint" role="button" tabindex="0">hint?</span>
            <div class="hint-text hidden">Hint will appear here.</div>
          </div>
          <div class="card-face card-back">
            <div class="card-back-body">
              <div class="card-label">Term</div>
              <div class="card-word">Term will appear here</div>
            </div>
            <div class="card-footnote">Click to flip for definition</div>
          </div>
        </div>
      </div>
      <div class="card-stack" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="controls">
      <button id="prev">Previous</button>
      <button id="next">Next</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
